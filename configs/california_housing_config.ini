; =============================================================================
; California Housing Regression Configuration
; =============================================================================
; Predict median house value from 8 tabular features.
; Dataset prepared by: tools/prepare_california_housing.py
; =============================================================================

[model]
architecture = 8,64,32,1
hidden_activation = relu
output_activation = linear

[training]
epochs = 60
batch_size = 64
learning_rate = 0.001
optimizer = adam
beta1 = 0.9
beta2 = 0.999
epsilon = 1e-8

[data]
train_data = csv/california_train.csv
train_labels = csv/california_train_labels.csv
val_data = csv/california_val.csv
val_labels = csv/california_val_labels.csv

[loss]
loss_function = mse

[logging]
print_every = 20
save_model = california_housing_model.bin
validate_every = 1

[options]
shuffle = true
random_seed = 42
gradient_clip = 5.0
